name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun run test
      - run: bun run madge:check
      - run: bash scripts/check-no-cut-agents.sh
